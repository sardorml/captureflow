<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font:
          11px/1.35 ui-sans-serif,
          system-ui,
          sans-serif;
      }
      #cam {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        background: #16181d;
        transform: scaleX(-1);
      }
      #blocked {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 14px;
        border-radius: 50%;
        background: #16181d;
        color: #c7ccd4;
        text-align: center;
      }
      #blocked b {
        color: #e8eaed;
      }
      #retry {
        border: 0;
        border-radius: 999px;
        padding: 6px 16px;
        background: #4f6bed;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      #retry:hover {
        background: #5d78f0;
      }
    </style>
  </head>
  <body>
    <video id="cam" autoplay muted playsinline></video>
    <div id="blocked">
      <span><b>Camera blocked</b><br />Allow it in the address bar</span>
      <button id="retry" type="button">Retry</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
