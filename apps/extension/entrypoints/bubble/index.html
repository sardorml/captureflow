<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #cam {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        background: #16181d;
        transform: scaleX(-1);
      }
      #blocked {
        display: none;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 10px;
        border-radius: 50%;
        background: #16181d;
        color: #9aa0aa;
        align-items: center;
        justify-content: center;
        text-align: center;
        font:
          11px/1.4 ui-sans-serif,
          system-ui,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <video id="cam" autoplay muted playsinline></video>
    <div id="blocked">Camera blocked — allow access for this extension</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
