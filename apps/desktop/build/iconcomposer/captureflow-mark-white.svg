     background + brand gradient (#3B82F6 → #2563EB). -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <path d="M 736.67 302.49 A 307.20 307.20 0 1 0 736.67 721.51"
