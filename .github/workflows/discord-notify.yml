name: Discord notifications

# Posts PR status changes and stars to the Discord #github channel via the
# plain webhook URL (secrets.DISCORD_WEBHOOK_URL) — the native /github
# integration silently drops draft toggles and star events. Star (`watch`)
# triggers only fire from the default branch.

on:
  pull_request:
    types: [opened, reopened, closed, ready_for_review, converted_to_draft]
  watch:
    types: [started]

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # PR titles are attacker-controlled on a public repo: pass them via env
      # and build the JSON with jq, never by interpolating into the script.
      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          SENDER: ${{ github.event.sender.login }}
          STARS: ${{ github.event.repository.stargazers_count }}
        run: |
          # Fork PRs get no secrets; skip rather than fail.
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL not available; skipping."
            exit 0
          fi

          if [ "$EVENT" = "watch" ]; then
            TEXT="⭐ $SENDER starred the repo — $STARS stars"
          else
            case "$ACTION" in
              opened) TEXT="🔀 $SENDER opened PR #$PR_NUMBER: $PR_TITLE" ;;
              reopened) TEXT="♻️ $SENDER reopened PR #$PR_NUMBER: $PR_TITLE" ;;
              ready_for_review) TEXT="📣 PR #$PR_NUMBER is ready for review: $PR_TITLE" ;;
              converted_to_draft) TEXT="📝 PR #$PR_NUMBER converted to draft: $PR_TITLE" ;;
              closed)
                if [ "$PR_MERGED" = "true" ]; then
                  TEXT="🎉 $SENDER merged PR #$PR_NUMBER: $PR_TITLE"
                else
                  TEXT="❌ $SENDER closed PR #$PR_NUMBER without merging: $PR_TITLE"
                fi
                ;;
              *) echo "Unhandled action: $ACTION"; exit 0 ;;
            esac
            TEXT="$TEXT
          $PR_URL"
          fi

          jq -n --arg content "$TEXT" '{content: $content}' |
            curl -sf -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"
