name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter @captureflow/web test
      - run: pnpm build

  # Server-side secret scan — the safety net for the local pre-push hook (which
  # contributors can skip with --no-verify or simply not have installed). Runs
  # on every push and PR; full history (fetch-depth: 0) so a secret can't slip
  # in via an older commit. Uses .gitleaks.toml. Free for public repos.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Auto-deploy the web worker (apps/web) to Cloudflare on every push to main,
  # but ONLY after `build` (typecheck + next build) passes. PRs never deploy —
  # the `if` limits this job to push events on the main branch.
  #
  # Required repo secrets (Settings → Secrets and variables → Actions):
  #   CLOUDFLARE_API_TOKEN   — API token scoped to this account with
  #                            Workers Scripts: Edit, D1: Edit, and
  #                            Workers R2 Storage: Edit (the "Edit Cloudflare
  #                            Workers" template + D1 covers it).
  #   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account id.
  # Worker RUNTIME secrets (BETTER_AUTH_SECRET, OAuth keys, …) live in
  # Cloudflare via `wrangler secret put` and are NOT needed here — deploy only
  # publishes code + the bindings/vars/crons declared in wrangler.jsonc.
  deploy:
    needs: [build, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Never let two deploys run at once; queue (don't cancel) so an in-flight
    # publish always finishes.
    concurrency:
      group: cloudflare-deploy
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Apply any new D1 migrations to the production database BEFORE the new
      # worker goes live, so the schema is ready when traffic hits it. Runs
      # non-interactively in CI. Remove this step if you'd rather gate schema
      # changes manually.
      - name: Apply D1 migrations (production)
        run: pnpm --filter @captureflow/web db:apply:remote
      # OpenNext build → publish. Bindings (D1/R2), vars, and cron triggers come
      # from apps/web/wrangler.jsonc.
      - name: Build & deploy worker
        run: pnpm --filter @captureflow/web cf:deploy

  # Deploy the VitePress docs site (apps/docs) to Cloudflare Pages on push to
  # main, gated behind the same build + secret-scan as the worker. Independent
  # of the worker deploy (separate concurrency group), so neither blocks the
  # other. NOTE: the CLOUDFLARE_API_TOKEN must additionally carry
  # "Cloudflare Pages: Edit" for this job — the Workers/D1/R2 token alone is not
  # enough. After the first successful deploy, bind docs.captureflow.xyz to the
  # captureflow-docs Pages project in the dashboard (Pages → Custom domains).
  deploy-docs:
    needs: [build, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-deploy-docs
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Create the Pages project on the first run; a no-op (|| true) afterwards.
      - name: Ensure Pages project exists
        run: pnpm --filter @captureflow/docs exec wrangler pages project create captureflow-docs --production-branch main || true
      # vitepress build → wrangler pages deploy .vitepress/dist
      - name: Build & deploy docs
        run: pnpm --filter @captureflow/docs cf:deploy
